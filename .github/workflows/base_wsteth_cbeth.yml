name: Run base wstETH/cbETH

on:
  schedule:
    - cron:  '*/15 * * * *'
  push:
      branches:
        - main

env:
  # A = wstETH, B = cbETH (Base)
  # Rates from screenzero backtest: 0.010% spread, 30d mean, fill overhead 0.181%/leg
  ARBZERO_APPCODE: "base_wsteth_cbeth"
  ARBZERO_TRADER: "0x2943ec8fb4e9b3e1ca73700869856be35aeee63e"
  ARBZERO_RPC_URL: ${{ secrets.BASE_RPC_URL }}
  ARBZERO_SIGNER: ${{ secrets.BASE_SIGNER_PK }}
  ARBZERO_TOKEN_A: "0xc1CBa3fCea344f92D9239c08C0568f6F2F0ee452"
  ARBZERO_TOKEN_B: "0x2Ae3F1Ec7F1F5012CFEab0185bfc7aa3cf0DEc22"
  ARBZERO_A_TO_B_RATE: "1.092135"
  ARBZERO_B_TO_A_RATE: "0.915821"
  ARBZERO_CHAIN: base

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Checkout Arbzero
        uses: actions/checkout@v4
        with:
          repository: trovezero/arbzero
          ref: main
          token: ${{ secrets.PAT_ANYONE_READS_ARBZERO }}
          path: arbzero
      - name: Install Dependencies
        working-directory: ./arbzero
        run: npm ci
      - name: Run Bot
        working-directory: ./arbzero
        run: npm start
